<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forward Mortgage Advisor -- Brian Mutter</title>
<style media="print">
  .topnav,.ttabs,.brand,.pg:not(#pg-cv),.stabs,.sctabs,
  button.btn:not(.clb),.hl-ctrl,.cv-right .card:not(:first-child),
  [style*="Save as PDF"]{display:none!important}
  #pg-cv{display:block!important;padding:0!important}
  .cv-layout{grid-template-columns:1fr!important}
  .cv-right{display:none}
  body{background:#fff!important;font-size:12pt}
  .card{box-shadow:none!important;border:1px solid #ccc!important;page-break-inside:avoid}
  .cv-hdr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
</style>
<style>
:root{--blue:#0070CF;--dark:#00548C;--light:#40B2FF;--pale:#CFE3F5;--green:#0FA86E;--bg:#EAEEF2;--border:#D4DAE2;--border2:#BEC7D2;--tx:#1A2030;--tx2:#5A6478;--tx3:#8A94A8;--r:10px;--r2:7px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Arial,sans-serif;--sh:0 1px 3px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.05);}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font);font-size:15px;color:var(--tx);background:var(--bg);-webkit-font-smoothing:antialiased}
.wrap{position:relative}
.mov{position:fixed;inset:0;background:rgba(10,20,50,.54);z-index:9999;display:none;align-items:center;justify-content:center;padding:24px 14px;overflow-y:auto}
.mov.open{display:flex}
.mbox{background:#fff;border-radius:var(--r);padding:1.6rem;max-width:820px;width:100%;box-shadow:0 16px 52px rgba(0,0,0,.24);border:1px solid rgba(0,0,0,.06);margin:auto}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.mhd h3{font-size:16px;font-weight:600;color:var(--blue)}
.mhd .mclose{font-size:18px;cursor:pointer;background:#f0f2f5;border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--tx2);line-height:1}
.mhd .mclose:hover{background:#e0e4ea;color:var(--tx)}
.mtbl{width:100%;border-collapse:collapse;font-size:14px}
.mtbl th{background:#f4f6f9;font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.mtbl td{padding:9px 10px;border-bottom:1px solid var(--border)}
.mtbl tr:last-child td{border-bottom:none}
.mtbl .r{text-align:right}.mtbl .bd{font-weight:600}
.brand{background:linear-gradient(120deg,var(--dark) 0%,var(--blue) 55%,#2a9fd4 100%);border-radius:var(--r) var(--r) 0 0;padding:1.4rem 1.7rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand-logo img{height:58px;object-fit:contain;filter:drop-shadow(0 1px 6px rgba(0,0,0,.3))}
.brand-right{display:flex;align-items:center;gap:13px}
.brand-hs{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid rgba(255,255,255,.6);box-shadow:0 2px 10px rgba(0,0,0,.2)}
.brand-info{color:#fff;line-height:1.5}
.brand-info .bn{font-size:16px;font-weight:600;letter-spacing:-.01em}
.brand-info .bt{font-size:13px;opacity:.87}
.brand-info .bd2{font-size:12px;opacity:.72;margin-top:1px}
.topnav{display:flex;align-items:center;gap:7px;background:#fff;padding:.7rem 1.3rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.csel{padding:7px 11px;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--r2);background:#fff;color:var(--tx);min-width:160px;font-family:var(--font)}
.ttabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 1.3rem;overflow-x:auto}
.ttab{padding:14px 17px;font-size:14px;border:none;background:none;cursor:pointer;color:var(--tx2);border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--font);font-weight:400;transition:color .15s}
.ttab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.ttab:hover{color:var(--tx)}
.pg{display:none}.pg.on{display:block;padding:1.2rem 1.3rem 2rem}
.sctabs{display:flex;gap:6px;margin-bottom:1.1rem;flex-wrap:wrap;align-items:center}
.sctab{padding:6px 15px;font-size:13px;border:1.5px solid var(--border2);border-radius:20px;cursor:pointer;background:#fff;color:var(--tx2);font-family:var(--font);transition:all .12s}
.sctab.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.sctab:hover:not(.on){background:#f4f6f9;border-color:var(--blue);color:var(--blue)}
.stabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.1rem}
.stab{padding:9px 15px;font-size:14px;border:none;background:none;cursor:pointer;color:var(--tx2);border-bottom:2.5px solid transparent;margin-bottom:-1px;font-family:var(--font);transition:color .15s}
.stab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.sp{display:none}.sp.on{display:block}
.sc-new-wrap{position:relative;display:inline-block;margin-left:6px}
.cmenu{position:absolute;top:calc(100% + 5px);left:0;background:#fff;border:1.5px solid var(--border2);border-radius:var(--r2);padding:8px;min-width:185px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.18);display:none}
.cmenu.op{display:block}
.cm-lbl{font-size:11.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:2px 4px 7px;display:block}
.cm-btn{display:block;width:100%;text-align:left;padding:8px 11px;font-size:14px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--tx);font-family:var(--font)}
.cm-btn:hover{background:#f0f6ff;color:var(--blue)}
.cm-div{border-top:1px solid var(--border);margin:6px 0}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.3rem 1.4rem;margin-bottom:1.15rem;box-shadow:var(--sh)}
.ct{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1.05rem;display:flex;align-items:center;gap:7px}
.ct::before{content:'';width:3px;height:12px;background:var(--blue);border-radius:3px;display:inline-block;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11.5px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em}
.f input,.f select{padding:8px 10px;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--r2);background:#fff !important;color:var(--tx);width:100%;font-family:var(--font);transition:border-color .15s}
.f input:focus,.f select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,112,207,.1)}
.f .nt{font-size:12px;color:var(--tx3);margin-top:2px}
.mt{background:#F4F8FF;border-radius:var(--r2);padding:11px 13px;text-align:center;border:1px solid #D8E8F8}
.mt .lb{font-size:10.5px;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;font-weight:700}
.mt .vl{font-size:16px;font-weight:500}
.mt.hi{background:linear-gradient(135deg,var(--blue),var(--dark));border-color:transparent}
.mt.hi .lb{color:rgba(255,255,255,.75)}
.mt.hi .vl{color:#fff;font-size:18px;font-weight:600}
.strip{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:1.05rem}
.strip .mt{flex:1;min-width:88px}
.dv{border:none;border-top:1px solid var(--border);margin:15px 0}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;font-weight:700;font-size:11.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;padding:6px 0;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 0;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl .r{text-align:right}.tbl .bd{font-weight:600}.tbl .bl{color:var(--blue);font-weight:600}
.tbl .mu{color:var(--tx2);font-size:13px;padding-left:13px}
.tbl .tr td{font-weight:600;border-top:1px solid var(--border2);border-bottom:none;padding-top:9px}
.tbl .sr td{background:#f4f6f9;font-size:11.5px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;padding:5px 0}
.fhdr{display:grid;grid-template-columns:1fr 110px 58px 26px;gap:7px;font-size:11.5px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;padding:0 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px}
.fr{display:grid;grid-template-columns:1fr 110px 58px 26px;gap:7px;align-items:center;margin-bottom:5px}
.fr input{padding:6px 8px;font-size:13px;border:1.5px solid var(--border2);border-radius:6px;background:#fff !important;color:var(--tx);width:100%;font-family:var(--font)}
.fr input:focus{outline:none;border-color:var(--blue)}
.achk{display:flex;align-items:center;justify-content:center;gap:3px;font-size:12px;color:var(--tx2)}
.achk input{width:auto;accent-color:var(--blue)}
.btn{padding:8px 15px;font-size:13px;border:1.5px solid var(--border2);border-radius:var(--r2);background:#fff;color:var(--tx);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s}
.btn:hover{background:#f4f6f9;border-color:var(--blue);color:var(--blue)}
.bsm{padding:5px 11px;font-size:12.5px}
.bpr{background:var(--blue);color:#fff;border-color:var(--blue)}.bpr:hover{background:var(--dark);border-color:var(--dark);color:#fff}
.bgr{background:#3B6D11;color:#fff;border-color:#3B6D11}.bgr:hover{background:#27500A;color:#fff}
.bgh{background:transparent;border:1.5px solid var(--blue);color:var(--blue)}.bgh:hover{background:#EEF5FF;color:var(--blue)}
.bdg{color:#A32D2D;border:none;background:none;cursor:pointer;padding:3px 6px;font-size:14px;opacity:.6}.bdg:hover{opacity:1}
.tc{padding:5px 12px;font-size:13px;border:1.5px solid var(--blue);border-radius:20px;cursor:pointer;background:#EEF5FF;color:var(--blue);font-family:var(--font);font-weight:500}
.tc:hover{background:var(--blue);color:#fff}
.ptcard{background:#EEF5FF;border:1.5px solid #B5D4F4;border-radius:var(--r);padding:1.3rem;margin-bottom:1.15rem}
.lccard{background:#E8FAF2;border:1.5px solid #9DD9BD;border-radius:var(--r);padding:1.3rem;margin-bottom:1.15rem}
.ptsrow{display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}
.ptsrow .f{flex:1;min-width:115px}
.ptsamt{font-size:21px;font-weight:600;color:var(--blue);align-self:center;white-space:nowrap}
.lcamt{font-size:21px;font-weight:600;color:var(--green);align-self:center;white-space:nowrap}
.rb{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:6px;align-items:baseline}
.nr{font-size:24px;font-weight:600;color:var(--blue);letter-spacing:-.02em}
.ar{font-size:16px;font-weight:500;color:var(--tx2)}
.arl{font-size:12px;color:var(--blue);text-decoration:underline;cursor:pointer;margin-left:3px;opacity:.75}
.arl:hover{opacity:1}
.in{font-size:13px;color:var(--tx2);background:#EEF5FF;border-radius:var(--r2);padding:9px 12px;line-height:1.6;border:1px solid #D5E5F8}
.mib{background:#FFF8E1;border:1px solid #F0C040;border-radius:var(--r2);padding:9px 12px;font-size:13px;color:#6B4800;line-height:1.6}
.dw{display:flex;align-items:center;gap:1.3rem;flex-wrap:wrap}
.dl{flex:1;min-width:135px;display:flex;flex-direction:column;gap:8px}
.di{display:flex;align-items:center;gap:8px;font-size:14px}
.ds{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.ifo{background:#EEF5FF;border:1.5px solid var(--blue);border-radius:var(--r2);padding:9px 11px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:7px}
.ifo input{padding:7px 10px;font-size:14px;border:1.5px solid var(--border2);border-radius:6px;background:#fff !important;color:var(--tx);min-width:145px;font-family:var(--font)}
.cv-hdr{background:linear-gradient(120deg,var(--dark) 0%,var(--blue) 60%,#2a9fd4 100%);border-radius:var(--r);padding:1.5rem 2rem;margin-bottom:1.15rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.cvl img{max-height:110px;width:auto;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,.22))}
.cva{display:flex;align-items:center;gap:11px}
.cvhs{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5)}
.cvtxt{color:#fff;line-height:1.4}
.cvnm{font-size:16px;font-weight:600}
.cvdt{font-size:13px;opacity:.78}
.cv-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.3rem;align-items:start}
@media(max-width:720px){.cv-layout{grid-template-columns:1fr}}
.cvt{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.cvt th{padding:10px 13px;font-size:13.5px;font-weight:600;color:#fff;text-align:center;border-right:1px solid rgba(255,255,255,.2)}
.cvt th:first-child{background:#1e2d3d;color:rgba(255,255,255,.62);font-size:11px;text-transform:uppercase;letter-spacing:.06em;text-align:left;border-right:1px solid rgba(255,255,255,.12);min-width:115px;padding:10px 12px}
.cvt th:last-child{border-right:none}
.cvt td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:14px;text-align:right;background:#fff}
.cvt td:first-child{text-align:left;color:var(--tx2);font-size:13px;font-weight:500;background:#F7F9FB;border-right:1px solid var(--border)}
.cvt tr:last-child td{border-bottom:none}
.cvr{font-size:14px;font-weight:600;color:var(--blue)}
.clb{display:inline-flex;align-items:center;gap:3px;font-size:14px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;font-family:var(--font);font-weight:500}
.clb:hover{text-decoration:underline}
.act{width:100%;border-collapse:collapse;font-size:14px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.act th{background:#1e2d3d;color:#fff;text-align:left;padding:9px 12px;font-size:12.5px;font-weight:600}
.act th:not(:first-child){text-align:right}
.act td{padding:9px 12px;border-bottom:1px solid var(--border)}
.act tr:last-child td{border-bottom:none}
.act td:not(:first-child){text-align:right}
.act .lbl{color:var(--tx2);font-size:13px;font-weight:500}
.act .tcost{font-weight:700;color:#C0392B}
.act .tsave.pos{font-weight:700;color:var(--green)}
.act .tsave.neg{font-weight:700;color:#A32D2D}
.act .nt{font-size:12px;color:var(--tx2);padding:6px 12px;background:#f8f9fb;font-style:italic}
.cwd{font-size:12px;color:var(--tx2);text-align:center;margin-top:.8rem;line-height:1.7}
.cw{position:relative;width:100%}
.svcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:9px;margin-bottom:1.15rem}
.vz{border:2px dashed #B5D4F4;border-radius:var(--r);padding:1.6rem;text-align:center;cursor:pointer;background:#EEF5FF}
@media(max-width:560px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}.fhdr,.fr{grid-template-columns:1fr 92px 54px 24px}.ptsrow{flex-direction:column}}
</style>

function mgicPMI(ltv,cs){
  if(ltv<=80)return 0;
  // LTV bands: <=85, <=90, <=95, <=97
  // CS bands (floor): 620,640,660,680,700,720,740,760
  const t={
    85:[0.60,0.50,0.42,0.34,0.28,0.24,0.20,0.17],
    90:[0.76,0.64,0.54,0.44,0.36,0.30,0.26,0.22],
    95:[1.32,1.16,1.00,0.86,0.72,0.60,0.52,0.44],
    97:[1.62,1.46,1.28,1.12,0.94,0.80,0.68,0.58],
  };
  const band=ltv<=85?85:ltv<=90?90:ltv<=95?95:97;
  // cs bands index: cs<620 → null, 620→0,640→1,660→2,680→3,700→4,720→5,740→6,760→7
  if(cs<620)return null;
  const csIdx=cs<640?0:cs<660?1:cs<680?2:cs<700?3:cs<720?4:cs<740?5:cs<760?6:7;
  return t[band][csIdx]/100;
}

  {name:'Processing fee',amt:500,apr:true},
  {name:'Survey fee',amt:400,apr:false},
  {name:'Condo certification',amt:350,apr:false},
];

function mpi(p,r,n){const m=r/100/12;if(!m)return p/n;return p*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1);}
function APR_calc(loan,pmt,mo,fc){
  if(loan<=0||pmt<=0||mo<=0)return 0;
  const af=Math.max(1,loan-fc);let r=0.005;
  for(let i=0;i<400;i++){
    const pow=Math.pow(1+r,mo);if(!isFinite(pow)||pow===0)break;
    const pv=pmt*(pow-1)/(r*pow);
    const num=pmt*(mo*r*pow*(pow-1)-pow*(pow-1)*(pow-1));const den=r*r*pow*pow;
    if(Math.abs(den)<1e-20)break;const dpv=num/den;const err=pv-af;if(Math.abs(err)<0.01)break;
    if(Math.abs(dpv)<1e-15)break;const nr=r-err/dpv;if(nr<=0){r=r/2;continue;}if(Math.abs(nr-r)<1e-10){r=nr;break;}r=nr;
  }
  const res=r*12*100;return(res>0&&res<50)?res:0;
}
function UMI(tp,pr,dn,va){
  const l=pr-dn,dp=dn/pr*100;
  if(tp==='fha')return{label:'FHA upfront MIP (1.75%)',amt:l*0.0175};
  if(tp==='va'){let p=dp>=10?0.0125:dp>=5?0.015:(va||'').includes('sub')?0.033:0.0215;return{label:'VA funding fee ('+(p*100).toFixed(2)+'%)',amt:l*p};}
  return null;
}
function MMI(tp,loan,pr,term,cs){
  const ltv=loan/pr*100;
  if(tp==='conv'){
    if(ltv<=80)return{mo:0,term:true,note:''};
    const ar=mgicPMI(ltv,cs||740);
    if(ar===null)return{mo:0,term:true,note:'PMI N/A — score below 620'};
    return{mo:loan*ar/12,term:true,note:'MGIC BPMI — '+(ar*100).toFixed(2)+'%/yr (LTV '+ltv.toFixed(1)+'%, score '+(cs||740)+')'};
  }
  if(tp==='fha'){
    const dp=(pr-loan)/pr*100;
    if(term===180)return{mo:loan*(ltv>90?0.005:0.0025)/12,term:ltv<=90,note:'FHA MIP 15-yr cancels at 78% LTV'};
    if(dp<10)return{mo:loan*(ltv>95?0.0055:0.005)/12,term:false,note:'FHA MIP 30-yr <10% dn: life of loan'};
    return{mo:loan*(ltv>95?0.0055:0.005)/12,term:true,note:'FHA MIP 30-yr ≥10% dn: cancels at 11 yrs'};
  }
  return{mo:0,term:true,note:''};
}
function ML(t){return t==='fha'?'FHA MIP':(t==='va'||t==='dscr')?null:'PMI';}
function TM(sc,c){
  if(sc.type!=='conv'||c.miMo<=0)return null;
  const r=sc.rate/100/12;let b=c.loan,tg=sc.sp*0.8;
  for(let m=1;m<=sc.term;m++){b-=(c.pi-b*r);if(b<=tg)return m;}return sc.term;
}

// ── Current Loan Calculations ──
function calcCurrentLoan(cl) {
  const c = cl.currentLoan;
  if (!c || !c.origAmt || !c.rate || !c.firstPayDate) return null;
  const r = c.rate / 100 / 12;
  const n = c.term;
  const pi = r > 0 ? c.origAmt * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1) : c.origAmt/n;
  // Calculate months elapsed from firstPayDate to today
  const [fm, fy] = c.firstPayDate.split('/').map(Number);
  if (!fm || !fy) return null;
  const first = new Date(fy, fm-1, 1);
  const today = new Date();
  const elapsed = Math.max(0, (today.getFullYear()-first.getFullYear())*12 + (today.getMonth()-first.getMonth()));
  const monthsElapsed = Math.min(elapsed, n);
  // Amortize to get current balance
  let bal = c.origAmt;
  for (let m = 0; m < monthsElapsed; m++) {
    const intPmt = bal * r;
    bal = bal - (pi - intPmt);
    if (bal < 0) { bal = 0; break; }
  }
  const currentBalance = Math.max(0, bal);
  const payoffBalance = currentBalance + currentBalance * r; // balance + 1 month interest
  const monthsRemaining = Math.max(0, n - monthsElapsed);
  return { pi, currentBalance, payoffBalance, monthsRemaining, monthsElapsed };
}

// Calculate remaining interest on current loan from today forward
function currentLoanRemainingInterest(cl, months) {
  const c = cl.currentLoan;
  const calc = calcCurrentLoan(cl);
  if (!calc) return 0;
  const r = c.rate / 100 / 12;
  let bal = calc.currentBalance;
  let totalInt = 0;
  const mo = Math.min(months, calc.monthsRemaining);
  for (let m = 0; m < mo; m++) {
    if (bal <= 0) break;
    const intPmt = bal * r;
    totalInt += intPmt;
    bal = bal - (calc.pi - intPmt);
  }
  return totalInt;
}

function CALC(sc){
  const pts=sc.pts||0;const pA=pts*sc.la/100;
  const um=UMI(sc.type,sc.sp,sc.dn,sc.vaS);
  const loan=sc.la+(um?um.amt:0);
  const pi=mpi(loan,sc.rate,sc.term);const rv=sc.rate/100/12;
  const tM=(sc.su+sc.wi)/12,iM=sc.ins/12;
  const md=MMI(sc.type,loan,sc.sp,sc.term,sc.cs||740);
  const miMo=sc.miOv?(sc.miMa||0):md.mo;
  const hoa=sc.condo?sc.hoa:0;
  const tot=pi+tM+iM+miMo+hoa;
  const pI_=loan*(sc.rate/100)/365*10;
  const tL=faL(sc.la);
  const fw=sc.fees.map(f=>f.iT?{...f,amt:tL}:f);
  const aF=fw.filter(f=>f.apr).reduce((a,f)=>a+(+f.amt||0),0)+Math.abs(pA);
  const cT=fw.reduce((a,f)=>a+(+f.amt||0),0)+pA;
  const apr=APR_calc(loan,pi,sc.term,aF+pI_);
  const eS=(ES[sc.cm]||0)*(sc.su/12),eW=(EW[sc.cm]||0)*(sc.wi/12),eI=3*iM;
  const eT=eS+eW+eI;
  const pS=(PS[sc.cm]||0)*(sc.su/12),pW=(PW[sc.cm]||0)*(sc.wi/12),pT_=pS+pW;
  const prT=sc.ins+pI_;
  const dn=sc.sp-sc.la;
  const gd=dn+cT+prT+eT+pT_;
  return{um,loan,pi,r:rv,tM,iM,miMo,md,hoa,tot,pI:pI_,aF,cT,pA,isLC:pts<0,apr,eS,eW,eI,eT,pS,pW,pT:pT_,prT,gd,tL,fw,ins:sc.ins,dn};
}

// cumData now accounts for extra principal (reinvestment)
function cumData(sc,c,mo,extraPrincipal){
  const r=sc.rate/100/12;let b=c.loan,tI=0,tMI=0,princPaid=0;
  const extra=extraPrincipal||0;
  const tm=c.md.term?TM(sc,c)||sc.term:sc.term;
  for(let m=0;m<mo;m++){
    if(b<=0)break;
    const ip=b*r;tI+=ip;
    if(c.miMo>0&&m<tm)tMI+=c.miMo;
    const reg=Math.min(c.pi-ip,b); // regular principal
    const addl=Math.min(extra,b-reg); // additional principal
    b-=(reg+addl);
    princPaid+=reg+addl;
  }
  return{totInt:tI,totMI:tMI,balRem:Math.max(0,b),princPaid,piPaid:c.pi*mo};
}

    + 'var rows=(d1&&d1.payload&&d1.payload.sections||[]).flatMap(function(s){return s.rows||[];});'
    + 'var prop=rows.find(function(r){return r.url&&r.url.indexOf("/home/")!==-1;});'
    + 'if(!prop){parent.postMessage({type:"rfResult",error:"Address not found on Redfin"},"*");return;}'

    + 'var rfUrl="https://www.redfin.com"+prop.url;'
    + 'var r2=await fetch(rfUrl);'
    + 'var html=await r2.text();'

    + 'parent.postMessage({type:"rfResult",monthly:monthly,rfUrl:rfUrl,displayName:nameMatch,streetOnly:prop.name},"*");'

// Blob iframe bridge: creates a hidden iframe, runs fetch inside redfin.com context
function redfinLookupBridge(query) {
  return new Promise(function(resolve) {
    var msgType = 'rf_' + Date.now();
    var blobUrl = null;
    var frame = null;

    function cleanup() {
      window.removeEventListener('message', handler);
      if (frame && frame.parentNode) frame.remove();
      if (blobUrl) URL.revokeObjectURL(blobUrl);
    }

    function handler(evt) {
      if (!evt.data || evt.data.type !== 'rfResult') return;
      cleanup();
      resolve(evt.data);
    }

    window.addEventListener('message', handler);
    setTimeout(function() { cleanup(); resolve({error:'Lookup timed out'}); }, 15000);

    // Build bridge HTML with the message type baked in
    var html = buildRedfinBridge(query).replace(
      'type:"rfResult"', 'type:' + JSON.stringify(msgType)
    ).replace(/type:"rfResult"/g, 'type:' + JSON.stringify(msgType));

    // Actually use a fixed type since we listen for rfResult
    var bridgeHtml = buildRedfinBridge(query);
    var blob = new Blob([bridgeHtml], {type:'text/html'});
    blobUrl = URL.createObjectURL(blob);
    frame = document.createElement('iframe');
    frame.style.cssText = 'display:none;position:fixed;top:-999px;width:1px;height:1px';
    frame.src = blobUrl;
    document.body.appendChild(frame);
  });
}

// PHP proxy: used when hosted on goforwardmortgage.com
async function redfinLookupProxy(query) {
  try {
    var r = await fetch(RF_PROXY + '?action=search&q=' + encodeURIComponent(query));
    var d = await r.json();
    var rows = (d.payload && d.payload.sections || []).flatMap(function(s){return s.rows||[];});
    var prop = rows.find(function(r){return r.url && r.url.indexOf('/home/') !== -1;});
    if (!prop) return {error:'Address not found'};
    var rfUrl = 'https://www.redfin.com' + prop.url;
    // Fetch tax via proxy
    var pid = prop.url.match(/\/home\/(\d+)/)?.[1];
    var r2 = await fetch(RF_PROXY + '?action=tax&pid=' + pid);
    var d2 = await r2.json();
    var tax = d2.payload && d2.payload.publicRecordsInfo && d2.payload.publicRecordsInfo.taxInfo;
    return {
      displayName: prop.name + (prop.subName ? ', '+prop.subName : ''),
      streetOnly: prop.name,
      rfUrl: rfUrl,
      monthly: tax && tax.taxesDue ? Math.round(tax.taxesDue/12) : null
    };
  } catch(e) { return {error: e.message}; }
}

const HOI_TABLE = [
  // [minPrice, maxPrice, sfr_annual, condo_annual]
  [0,       200000,  1200, 500],
  [200001,  250000,  1500, 600],
  [250001,  300000,  1600, 720],
  [300001,  400000,  1800, 900],
  [400001,  500000,  2200, 1000],
  [500001,  600000,  2400, 1100],
  [600001,  750000,  3200, 1200],
  [750001, 99999999, 4800, 2000],
];

function calcHOI(sp, isCondo) {
  sp = +sp || 0;
  for (const [min, max, sfr, condo] of HOI_TABLE) {
    if (sp >= min && sp <= max) return isCondo ? condo : sfr;
  }
  return isCondo ? 500 : 1200;
}

function applyAnnTax(i){
  const v=pI('tax-ann-'+i);if(!v)return;
  const ann=v;
  SC(i).su=Math.round(ann*0.7);SC(i).wi=Math.round(ann*0.3);
  const su=$('su-'+i);const wi=$('wi-'+i);
  if(su)su.value=fmtI(SC(i).su);if(wi)wi.value=fmtI(SC(i).wi);
  // Cross-populate monthly field
  const mo=$('tax-mo-'+i);if(mo)mo.value=fmtI(Math.round(ann/12));
  // Blue border on annual, reset monthly
  const annInp=$('tax-ann-'+i);const moInp=$('tax-mo-'+i);
  if(annInp)annInp.style.borderColor='var(--blue)';
  if(moInp)moInp.style.borderColor='';
  save();RO(i);if((AC().activeSubTab[i]||'det')==='cst')RC(i);
}
function applyMoTax(i){
  const v=pI('tax-mo-'+i);if(!v)return;
  const ann=v*12;SC(i).su=Math.round(ann*0.7);SC(i).wi=Math.round(ann*0.3);
  const su=$('su-'+i);const wi=$('wi-'+i);
  if(su)su.value=fmtI(SC(i).su);if(wi)wi.value=fmtI(SC(i).wi);
  // Cross-populate annual field
  const annInp=$('tax-ann-'+i);if(annInp)annInp.value=fmtI(ann);
  // Blue border on monthly, reset annual
  const moInp=$('tax-mo-'+i);
  if(moInp)moInp.style.borderColor='var(--blue)';
  if(annInp)annInp.style.borderColor='';
  save();RO(i);if((AC().activeSubTab[i]||'det')==='cst')RC(i);
}
function toggleLock(i){SC(i).dnLock=!SC(i).dnLock;save();BD(i);}
function oSP(i){
  const newSp=pI('sp-'+i);

  else{SC(i).sp=newSp;SC(i).la=Math.max(0,newSp-SC(i).dn);}
  save();SL(i);RO(i);if((AC().activeSubTab[i]||'det')==='cst')RC(i);
  autoHOI(i);
}

function SL(i){

function rSvCharts(data,mile,mile2,extra){
  setTimeout(()=>{
    const cl=AC();const best=data.reduce((bi,d,i)=>d.c.tot<data[bi].c.tot?i:bi,0);
    const colors=data.map((_,i)=>i===best?SC_COLORS[0]:'#00548C');

    // Monthly payment chart
    const cp=$('sv-pmt-chart');if(cp){if(SVC.svPmt)SVC.svPmt.destroy();
      const pmtVals=data.map(d=>Math.round(d.c.tot));
      const pmtMin=Math.min(...pmtVals);const pmtMax=Math.max(...pmtVals);
      const pmtPad=Math.max(50,Math.round((pmtMax-pmtMin)*0.5));
      SVC.svPmt=new Chart(cp.getContext('2d'),{type:'bar',data:{labels:data.map(d=>d.sc.name),datasets:[{data:pmtVals,backgroundColor:colors,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)+'/mo'}}},scales:{x:{grid:{display:false}},y:{min:Math.max(0,pmtMin-pmtPad),ticks:{callback:v=>'$'+v.toLocaleString()}}}}});}

    // Savings at short-term
    const rows1=data.map(d=>{const cd=cumData(d.sc,d.c,mile,extra);return{...cd,totalCost:cd.totInt+cd.totMI+d.c.cT};});
    const minC1=Math.min(...rows1.map(r=>r.totalCost));
    const cs1=$('sv-sav-chart');if(cs1){if(SVC.svSav)SVC.svSav.destroy();
      const maxC1=Math.max(...rows1.map(r=>r.totalCost));
      const savs=rows1.map(r=>Math.round(maxC1-r.totalCost));
      SVC.svSav=new Chart(cs1.getContext('2d'),{type:'bar',data:{labels:data.map(d=>d.sc.name),datasets:[{data:savs,backgroundColor:savs.map((s,i)=>s===Math.max(...savs)?'#0FA86E':i===savs.indexOf(Math.min(...savs))&&savs.length>2?'#1A3A5C':'#00548C'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw===0?' $0 (most expensive)':' '+fmt(ctx.raw)+' saved'}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k'}}}}});}

    // Int+MI at long-term
    const rows2=data.map(d=>{const cd=cumData(d.sc,d.c,mile2,extra);return{totInt:cd.totInt,totMI:cd.totMI};});
    const ci=$('sv-intmi-chart');if(ci){if(SVC.svIntMI)SVC.svIntMI.destroy();
      const hasMI=rows2.some(r=>r.totMI>0);
      SVC.svIntMI=new Chart(ci.getContext('2d'),{type:'bar',data:{labels:data.map(d=>d.sc.name),datasets:[{label:'Interest',data:rows2.map(r=>Math.round(r.totInt)),backgroundColor:colors,borderRadius:4},...(hasMI?[{label:'MI',data:rows2.map(r=>Math.round(r.totMI)),backgroundColor:colors.map(c=>c+'88'),borderRadius:4}]:[]) ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:hasMI,position:'top',labels:{boxWidth:9,font:{size:11}}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k'}}}}});}
  },80);
}

  const isRefi = cl.mode === 'refi';

  const fmtBal = n => '$' + Math.round(n).toLocaleString('en-US');

  // Auto-calc display rows
  const calcRows = calc ? (
    '<div id="cl-calc-area" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:1rem">'
    + _clCalcBox('Current Balance', fmtBal(calc.currentBalance), '#0070CF')
    + _clCalcBox('Payoff Balance', fmtBal(calc.payoffBalance), '#00548C', 'Balance + 1 month interest')
    + _clCalcBox('Months Remaining', calc.monthsRemaining + ' mo', '#1A6896')
    + _clCalcBox('Monthly P&I', fmtBal(calc.pi), '#0070CF')
    + _clCalcBox('Payments Made', calc.monthsElapsed + ' mo', '#5A6478')
    + '</div>'
  ) : '<div id="cl-calc-area" style="color:var(--tx2);font-size:13px;padding:12px;background:#f8f9fb;border-radius:8px;margin-top:1rem">Enter loan details above to see calculated values.</div>';

  $('clb').innerHTML = '<div class="card">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">'
    + '<div class="ct" style="margin-bottom:0">Current Loan</div>'
    + '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:500">'
    + '<span style="color:var(--tx2)">Purchase</span>'
    + '<div onclick="toggleMode()" style="position:relative;width:44px;height:24px;background:' + (isRefi ? '#0070CF' : '#C5CDD8') + ';border-radius:12px;cursor:pointer;transition:background .2s">'
    + '<div style="position:absolute;top:3px;left:' + (isRefi ? '23px' : '3px') + ';width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>'
    + '</div>'
    + '<span style="color:' + (isRefi ? '#0070CF' : 'var(--tx2)') + ';font-weight:' + (isRefi ? '600' : '400') + '">Refinance</span>'
    + '</label>'
    + '</div>'
    + (isRefi ? '' : '<div style="background:#FFF8E1;border:1px solid #F0C040;border-radius:8px;padding:10px 14px;font-size:13px;color:#5A4A00;line-height:1.6">Toggle <strong>Refinance</strong> to enable current loan entry and refi comparison mode.</div>')
    + (isRefi ?
      '<div class="g3" style="align-items:start">'
      + '<div class="f"><label>Original loan amount ($)</label><input id="cl-origamt" type="text" placeholder="e.g. 250000" value="' + (c.origAmt>0?fmtI(c.origAmt):'') + '" onblur="saveCL()"></div>'
      + '<div class="f"><label>First payment date (MM/YYYY)</label><input id="cl-fpdate" type="text" placeholder="01/2022" maxlength="7" value="' + (c.firstPayDate||'') + '" oninput="fmtDateMMYYYY(this)" onblur="saveCL()"></div>'
      + '<div class="f"><label>Interest rate (%)</label><input id="cl-rate" type="number" step="0.125" value="' + (c.rate||'') + '" onblur="saveCL()"></div>'
      + '<div class="f"><label>Term</label><select id="cl-term" onchange="saveCL()" style="padding:7px 8px;font-size:14px;border:1.5px solid var(--border2);border-radius:7px;background:#fff;font-family:var(--font)">'
      + '<option value="360"' + (c.term===360?' selected':'') + '>30 years (360 mo)</option>'
      + '<option value="300"' + (c.term===300?' selected':'') + '>25 years (300 mo)</option>'
      + '<option value="240"' + (c.term===240?' selected':'') + '>20 years (240 mo)</option>'
      + '<option value="180"' + (c.term===180?' selected':'') + '>15 years (180 mo)</option>'
      + '<option value="120"' + (c.term===120?' selected':'') + '>10 years (120 mo)</option>'
      + '</select></div>'
      + '</div>'
      + '<div class="dv"></div>'
      + '<div class="ct" style="font-size:13px;margin-bottom:.8rem">Monthly costs (for comparison)</div>'
      + '<div class="g3" style="align-items:start">'
      + '<div class="f"><label>Property taxes ($/mo)</label><input id="cl-taxes" type="number" step="1" value="' + (c.taxes||'') + '" onblur="saveCL()"></div>'
      + '<div class="f"><label>Home insurance ($/mo)</label><input id="cl-ins" type="number" step="1" value="' + (c.ins||'') + '" onblur="saveCL()"></div>'
      + '<div class="f"><label>HOA ($/mo)</label><input id="cl-hoa" type="number" step="1" value="' + (c.hoa||'') + '" onblur="saveCL()"></div>'
      + '<div class="f"><label>Mortgage insurance ($/mo)</label><input id="cl-mi" type="number" step="0.01" value="' + (c.mi||'') + '" onblur="saveCL()"></div>'
      + '<div class="f"><label>MI cutoff LTV (%)</label><input id="cl-micutoff" type="number" step="1" value="' + (c.miCutoff||78) + '" onblur="saveCL()"></div>'
      + '</div>'
      + '<div class="dv"></div>'
      + '<div style="font-size:13px;font-weight:600;color:#0070CF;margin-bottom:.8rem">Calculated values (read-only)</div>'
      + calcRows
    : '')
    + '</div>';
}

function _clCalcBox(label, value, color, note) {
  return '<div style="background:#F7F9FB;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">'
    + '<div style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">' + label + '</div>'
    + '<div style="font-size:18px;font-weight:700;color:' + (color||'#1A2030') + '">' + value + '</div>'
    + (note ? '<div style="font-size:10.5px;color:var(--tx3);margin-top:3px">' + note + '</div>' : '')
    + '</div>';
}

function fmtDateMMYYYY(inp) {
  let v = inp.value.replace(/[^0-9]/g,'');
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2,6);
  inp.value = v;
}

function saveCL() {
  const cl = AC();
  const c = cl.currentLoan;
  const g = id => $(id);
  c.origAmt = +(g('cl-origamt')?.value||'0').replace(/,/g,'') || 0;
  c.firstPayDate = g('cl-fpdate')?.value || '';
  c.rate = parseFloat(g('cl-rate')?.value) || 0;
  c.term = parseInt(g('cl-term')?.value) || 360;
  c.taxes = parseFloat(g('cl-taxes')?.value) || 0;
  c.ins = parseFloat(g('cl-ins')?.value) || 0;
  c.hoa = parseFloat(g('cl-hoa')?.value) || 0;
  c.mi = parseFloat(g('cl-mi')?.value) || 0;
  c.miCutoff = parseFloat(g('cl-micutoff')?.value) || 78;
  save();
  // Re-render the whole CL tab to update calc boxes
  RCL();
  // Refresh savings tab if visible
  if ($('pg-sv')?.classList.contains('on')) RSV();
}

function toggleMode() {
  const cl = AC();
  cl.mode = cl.mode === 'refi' ? 'purchase' : 'refi';
  save();
  RCL();
  // Also refresh comparison views
  if ($('pg-sv')?.classList.contains('on')) RSV();
  if ($('pg-cv')?.classList.contains('on')) RCV();
}

function RCV(){
  const cl=AC();
  if(!cl.hlRows)cl.hlRows=['Interest rate','Payment'];
  const visIdx=visScs();
  const extra=0;// per-scenario
  const calcs=visIdx.map((si,rank)=>{const sc=SCs()[si];const c=CALC(sc);return{sc,c,col:SC_COLORS[rank%SC_COLORS.length],si};});
  if(calcs.length===0){$('cvb').innerHTML='<div class="card" style="text-align:center;padding:2rem;color:var(--tx2)">No scenarios selected. Go to Presentation tab.</div>';return;}
  const isRefi=cl.mode==='refi';
  const currCalc=isRefi?calcCurrentLoan(cl):null;
  const currLoan=cl.currentLoan;
  const currPI=currCalc?currCalc.pi:0;
  const currTot=currCalc?(currPI+(currLoan.taxes||0)+(currLoan.ins||0)+(currLoan.hoa||0)+(currLoan.mi||0)):0;
  const minPmt=Math.min(...calcs.map(d=>d.c.tot));
  const minInv=Math.min(...calcs.map(d=>d.c.gd));
  const mile=cl.svMile||60;const mile2=cl.svMile2||360;
  const rows_s=calcs.map(d=>{const cd=cumData(d.sc,d.c,mile,d.sc.extra||0);return{...cd,closing:d.c.cT,totalCost:cd.totInt+cd.totMI+d.c.cT};});
  const rows_l=calcs.map(d=>{const cd=cumData(d.sc,d.c,mile2,d.sc.extra||0);return{...cd,closing:d.c.cT,totalCost:cd.totInt+cd.totMI+d.c.cT};});
  const minCostS=Math.min(...rows_s.map(r=>r.totalCost));
  const minCostL=Math.min(...rows_l.map(r=>r.totalCost));
  const bestIdxS=rows_s.reduce((bi,r,i)=>r.totalCost<rows_s[bi].totalCost?i:bi,0);
  const bestIdxL=rows_l.reduce((bi,r,i)=>r.totalCost<rows_l[bi].totalCost?i:bi,0);
  // Refi mode: remaining interest on current loan over same timeframe
  const currIntS=isRefi?currentLoanRemainingInterest(cl,mile):0;
  const currIntL=isRefi?currentLoanRemainingInterest(cl,mile2):0;
  // Break-even calculation: month when cumulative savings > closing costs
  const breakEven=isRefi&&currCalc?(()=>{
    if(!calcs.length)return null;
    const bestSc=calcs[bestIdxS];
    const monthlySav=currTot-(bestSc.c.tot);
    if(monthlySav<=0)return null;
    return Math.ceil(bestSc.c.cT/monthlySav);
  })():null;
  const bestPmt=calcs.reduce((bi,d,i)=>d.c.tot<calcs[bi].c.tot?i:bi,0);

  const isHl=r=>cl.hlRows.includes(r);
  // Prepend CURRENT column cell for refi mode
  const withCurr=(cells,currVal,hl)=>{
    if(!isRefi||!currCalc)return cells;
    const style='background:'+(hl?'#E8ECF0':'#F4F6F8')+';color:#2D3748;font-weight:'+(hl?'600':'400');
    return ['<span style="'+style+'">'+currVal+'</span>',...cells];
  };
  const currTh=isRefi&&currCalc?'<th style="background:#2D3748;min-width:130px">CURRENT<br><span style="font-size:10.5px;opacity:.82">'+(currLoan.rate||'?')+'% · '+(currLoan.term/12)+'-yr</span></th>':'';
  const thCells=currTh+calcs.map((d,rank)=>{
    const dnPct=Math.round((d.sc.sp-d.sc.la)/d.sc.sp*100);
    return'<th style="background:'+(rank===bestIdxS?SC_COLORS[0]:'#00548C')+'">'+d.sc.name+'<br><span style="font-size:10.5px;opacity:.82">'+d.sc.type.toUpperCase()+' · '+(d.sc.term/12)+'-yr · '+dnPct+'% dn</span></th>';
  }).join('');

  const aprLink='<a style="color:var(--blue);cursor:pointer;font-size:13px;font-weight:500" onclick="OL(\'https://en.wikipedia.org/wiki/Annual_percentage_rate#Failings_in_the_United_States\')">APR</a>';
  const buildRow=(lb,cells,hl,opts)=>{
    const divBelow=opts&&opts.divBelow;const isSav=opts&&opts.savings;
    return'<tr style="'+(isSav?'border-top:2px solid var(--border2)':'')+'"><td style="background:'+(hl?'#D8ECF9':'#F7F9FB')+';text-align:left;color:var(--tx2);font-size:13px;font-weight:500;border-right:1px solid var(--border);padding:10px 11px'+(isSav?';font-style:italic':'')+'">'+lb+'</td>'
      +cells.map(v=>'<td style="background:'+(hl?'#EBF5FF':'#fff')+';padding:10px 12px;font-size:14px;text-align:right;border-bottom:1px solid var(--border);font-weight:'+(hl?'600':'400')+'">'+v+'</td>').join('')+'</tr>'
      +(divBelow?'<tr><td colspan="'+(calcs.length+1)+'" style="padding:0;border-bottom:2px solid var(--border2)"></td></tr>':'');
  };

  const cC=(vals,cv,hl=false)=>isRefi&&currCalc?[cv,...vals]:vals;
  const tableRows=''

    +buildRow('Payment',cC(calcs.map((d,rank)=>'<button class="clb" onclick="MPM()" style="'+(rank===bestPmt?'color:var(--green);font-weight:700':'')+'">'+fmt(d.c.tot)+' ↗</button>'),currCalc?'<strong style="font-size:14px">'+fmt(currTot)+'</strong>':'—'),isHl('Payment'))
    +buildRow('Cash to close',cC(calcs.map(d=>'<button class="clb" onclick="MIM()" style="'+(d.c.gd===minInv?'color:var(--green);font-weight:700':'')+'">'+fmt(d.c.gd)+' ↗</button>'),isRefi?'<span style="color:var(--tx2)">$0</span>':'—'),isHl('Initial investment'),{divBelow:true})
    +(isRefi&&currCalc

      :buildRow('Monthly savings',calcs.map(d=>{const diff=d.c.tot-minPmt;return diff===0?'<span style="color:var(--green);font-weight:600">(lowest)</span>':'<span style="color:#A32D2D;font-size:13.5px">+'+fmt(diff).slice(1)+'/mo</span>';}),false,{savings:true}));

  // Int+MI labels for long-term
  const intMIlabels=calcs.map((d,rank)=>{
    const r=rows_l[rank];const hasMI=r.totMI>0;const tot=Math.round(r.totInt+r.totMI);
    const note=hasMI?'Int + MI paid':'Int paid (no MI)';const isBest=rank===bestIdxL;
    return'<div style="flex:1;text-align:center;padding:10px 6px;border-right:'+(rank<calcs.length-1?'1px solid var(--border)':'none')+';background:'+(isBest?SC_COLORS[0]+'14':'#F7F9FB')+'">'
      +'<div style="font-size:11.5px;font-weight:700;color:'+(isBest?SC_COLORS[0]:'#00548C')+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">'+d.sc.name+'</div>'
      +'<div style="font-size:20px;font-weight:700;color:'+(isBest?SC_COLORS[0]:'#00548C')+'">'+fmt(tot)+'</div>'
      +'<div style="font-size:11.5px;color:var(--tx2)">'+note+'</div>'
      +'</div>';
  }).join('');

// Quote date helpers
function qDateToInput(qd){if(!qd)return'';const p=qd.split(' ');if(!p[0])return'';const m=p[0].split('/');if(m.length<3)return'';return m[2]+'-'+m[0].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
function qIsEob(qd){return qd&&qd.includes('EOB');}
function updEob(){
  const cb=$('p-qeob');if(!cb)return;
  const dateInp=$('p-qdate');const lbl=cb.closest('label');
  if(cb.checked){
    // EOB mode — set time to EOB
    const d=dateInp?dateInp.value:'';
    if(d){const parts=d.split('-');if(parts.length>=3){const qd=parts[1]+'/'+parts[2]+'/'+parts[0]+' EOB';AC().quoteDate=qd;AC().disclaimerText=buildDisclaimerDefault(AC());save();const disp=$('qdate-display');if(disp)disp.textContent=qd;const discTa=$('p-disc');if(discTa)discTa.value=AC().disclaimerText;}}
    // Style checkbox label blue
    if(lbl){lbl.style.background='#EBF5FF';lbl.style.borderColor='var(--blue)';}
    // Disable time/ampm
    const tw=$('p-qtimewrap');const aw=$('p-qampmwrap');if(tw)tw.style.display='none';if(aw)aw.style.display='none';
  } else {

    const tw=$('p-qtimewrap');const aw=$('p-qampmwrap');if(tw)tw.style.display='';if(aw)aw.style.display='';

function qTimeVal(qd){if(!qd)return'12:00';const p=qd.split(' ');return p[1]||'12:00';}
function qAmPm(qd){if(!qd)return'AM';const p=qd.split(' ');return p[2]||'AM';}
function fmtTimeInput(inp){
  let v=inp.value.replace(/[^0-9]/g,'');

function updQDate(){
  const dateInp=$('p-qdate');const timeInp=$('p-qtime');const ampmSel=$('p-qampm');
  if(!dateInp||!timeInp||!ampmSel)return;
  const d=dateInp.value;const t=timeInp.value||'12:00';const ap=ampmSel.value;
  if(!d)return;
  const parts=d.split('-');if(parts.length<3)return;
  const qd=parts[1]+'/'+parts[2]+'/'+parts[0]+' '+t+' '+ap;

  AC().disclaimerText=buildDisclaimerDefault(AC());

  const discTa=$('p-disc');if(discTa)discTa.value=AC().disclaimerText;

function genLink(){
  try{
    const cl=AC();
    const payload=JSON.stringify({n:cl.name,s:cl.scenarios,vs:cl.visibleScenarios,hl:cl.hlRows,wt:cl.welcomeText,dt:cl.disclaimerText,qd:cl.quoteDate,mile:cl.svMile||60,mile2:cl.svMile2||360,extra:cl.extraPrincipal||0,vid:cl.videoUrl||'',vd:cl.videoData||''});

    const encoded=btoa(unescape(encodeURIComponent(payload)));

    const url=base+'#cv='+encoded;

        const el=$('link-out');
        if(el){el.innerHTML='<div style="background:#E8FAF2;border:1px solid #9DD9BD;border-radius:8px;padding:10px 14px;margin-top:8px;display:flex;align-items:center;gap:10px">'
          +'<span style="font-size:18px">✅</span>'
          +'<div><div style="font-size:13.5px;font-weight:600;color:#0A6B40">Link copied to clipboard!</div>'
          +'<div style="font-size:12px;color:var(--tx2);margin-top:2px">Paste and send to your client. Regenerate after making changes.</div>'
          +'<button onclick="showLinkUrl()" style="margin-top:6px;font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0">Show URL</button>'
          +'</div></div>';}
        window._lastLink=url;
      }).catch(()=>fallbackCopyLink(url));

  }catch(e){OM('Error','<p>Could not generate link: '+e.message+'</p>');}

function MCM(){
  const cs=visScs().map(si=>{const sc=SCs()[si];const c=CALC(sc);return{sc,c};});
  const allN=[...new Set(cs.flatMap(({sc})=>sc.fees.map(f=>f.name)).filter(Boolean))];
  const nonTitle=allN.filter(n=>!n.startsWith('Title'));
  const titleFees=allN.filter(n=>n.startsWith('Title'));
  const makeRow=name=>{const vs=cs.map(({sc,c})=>{const f=sc.fees.find(x=>x.name===name);if(!f)return'—';if(f.iT)return fmt(c.tL);return f.amt?fmt(f.amt):'—';});return'<tr><td>'+name+'</td>'+vs.map(v=>'<td class="r">'+v+'</td>').join('')+'</tr>';};
  const ptsR=cs.some(({sc})=>sc.pts!==0)?'<tr><td>'+(cs.some(({sc})=>sc.pts<0)?'Lender credit':'Discount points')+'</td>'+cs.map(({sc})=>{const v=sc.pts*sc.la/100;const pct=Math.abs(sc.pts);return'<td class="r" style="'+(sc.pts<0?'color:var(--green)':'')+'">'+(sc.pts<0?'-':'')+fmt(Math.abs(v))+(pct>0?' ('+pct.toFixed(3).replace(/\.?0+$/,'')+'%)':'')+' </td>';}).join('')+'</tr>':'';
  OM('Closing costs','<table class="mtbl">'+CGP()+'<tr><th>Fee</th>'+SCH_fn()+'</tr>'+nonTitle.map(makeRow).join('')+ptsR+titleFees.map(makeRow).join('')+'<tr style="font-weight:600;background:#f8f9fb"><td>Total</td>'+cs.map(({c})=>'<td class="r">'+fmt(c.cT)+'</td>').join('')+'</tr></table>',MIM);

function MCA(mo){

function embedVideoUrl(url){
  if(!url)return '';
  const ytMatch=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)+([\w-]+)/);
  if(ytMatch)return 'https://www.youtube.com/embed/'+ytMatch[1]+'?autoplay=0';
  const vmMatch=url.match(/vimeo\.com\/(\d+)/);
  if(vmMatch)return 'https://player.vimeo.com/video/'+vmMatch[1];
  return url;
}

function sendViewNotification(clientName) {

// Send follow-up with engagement data when client leaves/closes
function sendEngagementNotification(clientName) {
  if (EMAILJS_SERVICE_ID === 'YOUR_SERVICE_ID') return;

  const elapsed = Math.round((Date.now() - _trackData.startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const timeStr = (mins > 0 ? mins + ' min ' : '') + secs + ' sec';
  const clicksStr = _trackData.clicks.length > 0
    ? _trackData.clicks.map(c => c.label + ' at ' + c.time).join('; ')
    : 'None';

  const payload = {
    service_id: EMAILJS_SERVICE_ID,
    template_id: EMAILJS_TEMPLATE_ID,
    user_id: EMAILJS_PUBLIC_KEY,
    template_params: {
      to_email: NOTIFY_EMAIL,
      subject: 'Engagement update: ' + clientName + ' viewed for ' + timeStr,
      client_name: clientName,
      viewed_at: _trackData.opened ? _trackData.opened.toLocaleString() : '',
      message: 'Client: ' + clientName + '\nTime on page: ' + timeStr + '\nLinks clicked: ' + clicksStr
    }
  };

  navigator.sendBeacon
    ? navigator.sendBeacon('https://api.emailjs.com/api/v1.0/email/send', JSON.stringify(payload))
    : fetch('https://api.emailjs.com/api/v1.0/email/send', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload), keepalive:true });
}


function checkReadOnly(){
  const hash=window.location.hash;
  if(!hash.startsWith('#cv='))return false;
  try{
    const raw=hash.slice(4);
    // Decode - support both old z-prefix (LZString) and standard btoa
    let json;
    if(raw.startsWith('z')){
      // Old format - try to handle gracefully by stripping z and decoding
      try{json=decodeURIComponent(escape(atob(raw.slice(1))));}catch(e2){
        // If that fails too, try the full raw without z prefix via URI decode
        json=decodeURIComponent(escape(atob(raw)));
      }
    } else {
      json=decodeURIComponent(escape(atob(raw)));
    }
    const cl=JSON.parse(json);
    // Load the client data into a read-only slot
    const roId='__ro_'+Date.now();
    clients[roId]={...cl,id:roId,scenarios:cl.s||cl.scenarios||[],
      visibleScenarios:cl.vs||cl.visibleScenarios||null,
      hlRows:cl.hl||cl.hlRows||['Interest rate','Payment'],
      welcomeText:cl.wt||cl.welcomeText||'',
      disclaimerText:cl.dt||cl.disclaimerText||'',
      quoteDate:cl.qd||cl.quoteDate||'',
      svMile:cl.mile||cl.svMile||60,
      svMile2:cl.mile2||cl.svMile2||360,
      extraPrincipal:cl.extra||cl.extraPrincipal||0,videoUrl:cl.vid||cl.videoUrl||'',videoData:cl.vd||cl.videoData||'',
      templates:{},activeSubTab:{},activeSc:0};
    activeCID=roId;
    // Hide the entire advisor shell, show only a clean client view
    document.body.style.background='#EAEEF2';
    document.body.style.fontFamily="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Arial,sans-serif";
    // Replace body content with a clean wrapper that still has the modal
    document.body.innerHTML=
      '<div id="modal" class="mov" onclick="if(event.target===this)CM()">'
      +'<div class="mbox"><div class="mhd"><h3 id="mt"></h3>'
      +'<button class="mclose" onclick="CM()">✕</button></div>'
      +'<div id="mb"></div>'
      +'<div id="mbk" style="margin-top:10px;display:none">'
      +'<button class="btn bgh bsm" onclick="MB()">← Back</button></div>'
      +'</div></div>'
      +'<div style="max-width:1100px;margin:0 auto;padding:14px 14px 40px">'
      +'<div id="cvb"></div>'
      +'</div>';
    // Send immediate view notification
    const roClientName = clients[roId].name || 'Unknown';
    sendViewNotification(roClientName);

    // Send engagement data when client leaves
    window.addEventListener('beforeunload', () => sendEngagementNotification(roClientName));
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') sendEngagementNotification(roClientName);
    });

    // Show disclosure modal FIRST, then render CV on accept
    showDisclosure(roClientName, () => {
      RCV();
      // Instrument link clicks for tracking after CV renders
      setTimeout(() => {
        document.querySelectorAll('.clb').forEach(btn => {
          btn.addEventListener('click', () => _trackClick(btn.textContent.trim().slice(0,40)), {once:false});
        });
      }, 500);
    });

    return true;
  }catch(e){
    console.error('Read-only render failed:',e);
    return false;
  }
}

function pdfFlow(){
  const cl=AC();
  // Try to capture chart images from already-rendered client view canvases
  function captureCanvas(id){

    catch(e){ return ''; }
  }

}
function _doPdfFlow(cl, chartImgs){
  const visIdx=visScs();
  const calcs=visIdx.map((si,rank)=>{const sc=SCs()[si];const c=CALC(sc);return{sc,c,col:SC_COLORS[rank%SC_COLORS.length],si};});
  if(!calcs.length){OM('No scenarios','<p>Please add at least one scenario.</p>');return;}

  const mile=cl.svMile||60;
  const mile2=cl.svMile2||360;
  const extra=0;// per-scenario
  const rows_s=calcs.map(d=>{const cd=cumData(d.sc,d.c,mile,d.sc.extra||0);return{...cd,closing:d.c.cT,totalCost:cd.totInt+cd.totMI+d.c.cT};});
  const rows_l=calcs.map(d=>{const cd=cumData(d.sc,d.c,mile2,d.sc.extra||0);return{...cd,closing:d.c.cT,totalCost:cd.totInt+cd.totMI+d.c.cT};});

  // Find best/worst for coloring
  const allPmt=calcs.map(d=>d.c.tot);
  const allInv=calcs.map(d=>d.c.gd);
  const allRate=calcs.map(d=>d.sc.rate);
  const minPmt=Math.min(...allPmt),maxPmt=Math.max(...allPmt);
  const minInv=Math.min(...allInv),maxInv=Math.max(...allInv);
  const minRate=Math.min(...allRate),maxRate=Math.max(...allRate);

  function valColor(val,arr,invert){
    if(arr.length<2)return'';
    const mn=Math.min(...arr),mx=Math.max(...arr);
    if(mn===mx)return'';
    if(val===mn)return invert?'#A32D2D':'#0A6B40';
    if(val===mx)return invert?'#0A6B40':'#A32D2D';

  // Client name + date subheader
  function subHeader(){
    const prepFor=cl.name?'<div style="-webkit-print-color-adjust:exact;print-color-adjust:exact;background:linear-gradient(90deg,#EBF5FF,#F5FAFF);border-left:3px solid #0070CF;padding:5px 12px;margin-bottom:10px;border-radius:0 6px 6px 0"><span style="font-size:11.5px;color:#5A6478;font-style:italic">Prepared exclusively for </span><span style="font-size:12px;font-weight:700;color:#0070CF">'+cl.name+'</span></div>':'';
    return '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">'
      +'<div style="font-size:20px;font-weight:700;color:#1A2030">'+cl.name+'</div>'
      +'<div style="font-size:12px;color:#5A6478">'+(cl.quoteDate||'')+'</div>'
      +'</div>'+prepFor;
  }

  function heading(txt){
    return '<div style="font-size:13px;font-weight:700;color:#0070CF;text-transform:uppercase;letter-spacing:.07em;padding-bottom:7px;border-bottom:2px solid #D4DAE2;margin-bottom:14px">'+txt+'</div>';
  }

  function tblNarrow(rows){
    return '<table style="width:100%;border-collapse:collapse;border:1px solid #D4DAE2;border-radius:6px;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact">'
      +'<thead><tr><th style="'+thFirst+';font-size:10px;padding:7px 9px">Item</th>'+colHeaders.replace(/padding:10px 13px/g,'padding:7px 9px').replace(/font-size:12px/g,'font-size:10.5px')+'</tr></thead>'
      +'<tbody>'+rows+'</tbody></table>';
  }
  function tbl(rows){
    return '<table style="width:100%;border-collapse:collapse;border:1px solid #D4DAE2;border-radius:8px;overflow:hidden;margin-bottom:20px;-webkit-print-color-adjust:exact;print-color-adjust:exact">'
      +'<thead><tr><th style="'+thFirst+'"></th>'+colHeaders+'</tr></thead>'
      +'<tbody>'+rows+'</tbody></table>';
  }

  const discHtml=cl.disclaimerText
    ?'<div style="font-size:10.5px;color:#666;line-height:1.65;padding:11px 13px;background:#f8f9fb;border:1px solid #ddd;border-radius:6px;margin-top:12px"><strong>Assumptions for these scenarios:</strong> '+cl.disclaimerText+'</div>':'';

  const pageBreak='<div style="page-break-before:always;padding-top:16px"></div>';

  // PAGE 1: Loan comparison
  const mainRows=
    row('Purchase price',calcs.map(d=>fmt(d.sc.sp)))+
    row('Loan amount',calcs.map(d=>fmt(d.sc.la)))+
    row('Interest rate',calcs.map(d=>d.sc.rate.toFixed(3)+'%'),false,true,rateColors)+
    row('APR',calcs.map(d=>d.c.apr.toFixed(3)+'%'))+
    divider()+
    row('Monthly payment',calcs.map(d=>fmt(d.c.tot)),true,false,pmtColors)+
    row('Initial investment',calcs.map(d=>fmt(d.c.gd)),true,false,invColors);

  // PAGE 2: Payment breakdown + investment summary
  const pmtRows=
    row('P&amp;I',calcs.map(d=>fmt(d.c.pi)),true)+
    (calcs.some(d=>d.c.miMo>0)?row('Mortgage insurance',calcs.map(d=>d.c.miMo>0?fmt(d.c.miMo):'--')):'') +
    row('Property taxes',calcs.map(d=>fmt(d.c.tM)))+
    row('Home insurance',calcs.map(d=>fmt(d.c.iM)))+
    (calcs.some(d=>d.sc.condo&&d.c.hoa>0)?row('HOA',calcs.map(d=>d.sc.condo&&d.c.hoa>0?fmt(d.c.hoa):'--')):'') +
    (calcs.some(d=>(d.sc.extra||0)>0)?row('Principal reduction',calcs.map(d=>(d.sc.extra||0)>0?fmt(d.sc.extra):'--')):'') +
    divider()+
    row('Total monthly payment',calcs.map(d=>fmt(d.c.tot)),true,false,pmtColors);

  const invRows=
    row('Down payment',calcs.map(d=>fmt(d.c.dn)),true)+
    row('Closing costs',calcs.map(d=>fmt(d.c.cT)))+
    row('Prepaid items',calcs.map(d=>fmt(d.sc.ins+d.c.pI+d.c.eT+d.c.pT)))+
    divider()+
    row('Estimated initial investment',calcs.map(d=>fmt(d.c.gd)),true,false,invColors);

  // PAGE 3: Closing costs & prepaids detail
  const allFeeNames=[...new Set(calcs.flatMap(d=>d.sc.fees.map(f=>f.name)).filter(Boolean))];
  // Discount points / lender credit row with % annotation
  const ptsRow=calcs.some(d=>d.sc.pts!==0)
    ?row(calcs.some(d=>d.sc.pts<0)?'Lender credit':'Discount points',
        calcs.map(d=>{const v=d.sc.pts*d.sc.la/100;const pct=Math.abs(d.sc.pts);
          return d.sc.pts===0?'--':(d.sc.pts<0?'-':'')+fmt(Math.abs(v))+(pct>0?' ('+pct.toFixed(3).replace(/\.?0+$/,'')+'%)':'');}),
        false,false,calcs.map(d=>d.sc.pts<0?'#0A6B40':d.sc.pts>0?'':''))
    :'';
  const nonTitleFees=allFeeNames.filter(n=>!n.startsWith('Title'));
  const titleFees=allFeeNames.filter(n=>n.startsWith('Title'));
  const feeRow=name=>row(name,calcs.map(d=>{const f=d.sc.fees.find(x=>x.name===name);if(!f)return'--';return f.iT?fmt(d.c.tL):f.amt?fmt(f.amt):'--';}));
  const ccRows=
    nonTitleFees.map(feeRow).join('')+ptsRow+titleFees.map(feeRow).join('')+
    divider()+row('Total closing costs',calcs.map(d=>fmt(d.c.cT)),true);

  // Prepaid items with totals first then indented detail
  const prepRows=
    row('First year home insurance',calcs.map(d=>fmt(d.sc.ins)))+
    row('Prepaid interest (10 days)',calcs.map(d=>fmt(d.c.pI)))+
    // Escrow: total then indented
    row('Escrow collection',calcs.map(d=>fmt(d.c.eT)),true)+
    rowIndent('Summer tax escrow',calcs.map(d=>'  '+fmt(d.c.eS)+' ('+ES[d.sc.cm]+' mo)'))+
    rowIndent('Winter tax escrow',calcs.map(d=>'  '+fmt(d.c.eW)+' ('+EW[d.sc.cm]+' mo)'))+
    rowIndent('Insurance escrow (3 mo)',calcs.map(d=>fmt(d.c.eI)))+
    // Proration: total then indented
    row('Property tax prorations',calcs.map(d=>fmt(d.c.pT)),true)+
    rowIndent('Summer proration',calcs.map(d=>fmt(d.c.pS)+' ('+PS[d.sc.cm]+' mo)'))+
    rowIndent('Winter proration',calcs.map(d=>fmt(d.c.pW)+' ('+PW[d.sc.cm]+' mo)'))+
    divider()+
    row('Total prepaid items',calcs.map(d=>fmt(d.sc.ins+d.c.pI+d.c.eT+d.c.pT)),true);

  // ── Build chart data URLs for PDF embedding ──
  // We render charts to canvas using Chart.js and capture as images

  const html='<!DOCTYPE html><html><head><meta charset="utf-8">'
    +'<title>'+cl.name+' - Mortgage Analysis</title>'
    +'<style>'
    +'@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");'
    +'*{box-sizing:border-box}'
    +'body{font-family:Inter,-apple-system,sans-serif;margin:0;padding:18px 22px;font-size:13px;color:#1A2030;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}'
    +'table{border-spacing:0}'
    +'.pg{page-break-after:always;padding-bottom:8px}'
    +'@media print{@page{margin:10mm 8mm;size:letter landscape}body{padding:0}.no-print{display:none!important}.pg{page-break-after:always}}'
    +'</style></head><body>'
    +'<div class="no-print" style="background:#EBF5FF;border:1px solid #B5D4F4;border-radius:8px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">'

    +'<button onclick="window.print()" style="background:#0070CF;color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600">&#128424; Print / Save as PDF</button>'
    +'</div>'

    +tblNarrow(prepRows)
    +'</div>'
    +'</div>'
    +'</div>'

    // ── PAGE 4: Long-term analysis — charts + tables ──
    +'<div>'
    +makeBanner()+subHeader()
    +heading('Long-Term Cost Analysis')
    // Charts row
    +(chartImgs[0]||chartImgs[1]||chartImgs[2]
      ?'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">'
        +(chartImgs[0]?'<div><div style="font-size:10px;font-weight:700;color:#0070CF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Monthly Payment</div><img src="'+chartImgs[0]+'" style="width:100%;border-radius:5px"></div>':'')

  // Write into a print iframe instead of popup (avoids popup blocker)

  frame.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:999999;background:#fff';

// ── VIDEO TAB ──
// videoObjectUrl holds a temporary URL for large uploaded files (not persisted to localStorage)
let _videoObjectUrl = null;

function initVideoTab() {
  const cl = AC();
  const uploadZone = document.getElementById('vid-upload-zone');
  const recBtn = document.getElementById('vid-rec-btn');
  const stopBtn = document.getElementById('vid-stop-btn');
  const preview = document.getElementById('vid-preview');
  const player = document.getElementById('vid-player');
  const camSel = document.getElementById('vid-cam-sel');
  const micSel = document.getElementById('vid-mic-sel');
  const fileInput = document.getElementById('vid-file-input');
  const warn = document.getElementById('vid-warn');
  const removeBtn = document.getElementById('vid-remove-btn');
  const filename = document.getElementById('vid-filename');

  if (!uploadZone) return;

  // Populate camera/mic selectors
  navigator.mediaDevices.enumerateDevices().then(devices => {
    const cams = devices.filter(d => d.kind === 'videoinput');
    const mics = devices.filter(d => d.kind === 'audioinput');
    camSel.innerHTML = cams.map((d,i) => '<option value="' + d.deviceId + '">' + (d.label || 'Camera ' + (i+1)) + '</option>').join('');
    micSel.innerHTML = mics.map((d,i) => '<option value="' + d.deviceId + '">' + (d.label || 'Mic ' + (i+1)) + '</option>').join('');
  }).catch(() => {});

  // Show existing video if any
  if (_videoObjectUrl) {
    showVideoPlayer(_videoObjectUrl);
  } else if (cl.videoData) {
    showVideoPlayer(cl.videoData);
  }
}

function showVideoPlayer(src) {
  const z = document.getElementById('vid-upload-zone');
  const p = document.getElementById('vid-preview');
  const player = document.getElementById('vid-player');
  const controls = document.getElementById('vid-record-controls');
  if (!p || !player) return;
  player.src = src;
  z.style.display = 'none';
  if (controls) controls.style.display = 'none';
  p.style.display = 'block';
}

function hideVideoPlayer() {
  const z = document.getElementById('vid-upload-zone');
  const p = document.getElementById('vid-preview');
  const controls = document.getElementById('vid-record-controls');
  if (z) z.style.display = '';
  if (controls) controls.style.display = '';
  if (p) p.style.display = 'none';
}

function handleVideoUpload(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const warn = document.getElementById('vid-warn');
  const fn = document.getElementById('vid-filename');
  const mb = (file.size / 1024 / 1024).toFixed(1);

  // Use object URL for large files (no size limit, works great for local use)
  // For the shared client link, video won't be embedded if > ~2MB due to URL limits
  if (_videoObjectUrl) URL.revokeObjectURL(_videoObjectUrl);
  _videoObjectUrl = URL.createObjectURL(file);

  // Only store small videos in localStorage (< 8MB base64 ~ 6MB file)
  if (file.size < 6 * 1024 * 1024) {
    const reader = new FileReader();
    reader.onload = ev => {
      AC().videoData = ev.target.result;
      save();
    };
    reader.readAsDataURL(file);
  } else {
    // Large file: use object URL for this session only
    AC().videoData = '';
    if (warn) warn.innerHTML = '<span style="color:#E67E00">&#9888; ' + mb + ' MB file — video plays now but won\'t persist after reload. For permanent storage, host the file externally and use the URL tab.</span>';
  }

  showVideoPlayer(_videoObjectUrl);
  if (fn) fn.textContent = file.name + ' (' + mb + ' MB)';
}

let _mediaRecorder = null;
let _recChunks = [];
let _recStream = null;
let _recTimer = null;
let _recSeconds = 0;

function startRecording() {
  const camSel = document.getElementById('vid-cam-sel');
  const micSel = document.getElementById('vid-mic-sel');
  const recBtn = document.getElementById('vid-rec-btn');
  const stopBtn = document.getElementById('vid-stop-btn');
  const timer = document.getElementById('vid-rec-timer');

  const constraints = {
    video: camSel && camSel.value ? { deviceId: { exact: camSel.value } } : true,
    audio: micSel && micSel.value ? { deviceId: { exact: micSel.value } } : true
  };

  navigator.mediaDevices.getUserMedia(constraints).then(stream => {
    _recStream = stream;
    _recChunks = [];

    // Show live preview
    const livePreview = document.getElementById('vid-live-preview');
    if (livePreview) { livePreview.srcObject = stream; livePreview.style.display = 'block'; }

    // Choose best available codec
    const mimeType = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4']
      .find(t => MediaRecorder.isTypeSupported(t)) || '';
    _mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _recChunks.push(e.data); };
    _mediaRecorder.onstop = finishRecording;
    _mediaRecorder.start(1000);

    if (recBtn) recBtn.style.display = 'none';
    if (stopBtn) stopBtn.style.display = '';

    // Timer
    _recSeconds = 0;
    _recTimer = setInterval(() => {
      _recSeconds++;
      const m = String(Math.floor(_recSeconds/60)).padStart(2,'0');
      const s = String(_recSeconds%60).padStart(2,'0');
      if (timer) timer.textContent = m + ':' + s;
    }, 1000);
  }).catch(err => {
    const warn = document.getElementById('vid-warn');
    if (warn) warn.innerHTML = '<span style="color:#A32D2D">&#9888; Camera access denied: ' + err.message + '</span>';
  });
}

function stopRecording() {
  if (_mediaRecorder && _mediaRecorder.state !== 'inactive') _mediaRecorder.stop();
  if (_recStream) { _recStream.getTracks().forEach(t => t.stop()); _recStream = null; }
  if (_recTimer) { clearInterval(_recTimer); _recTimer = null; }
  const livePreview = document.getElementById('vid-live-preview');
  if (livePreview) { livePreview.srcObject = null; livePreview.style.display = 'none'; }
  const stopBtn = document.getElementById('vid-stop-btn');
  const recBtn = document.getElementById('vid-rec-btn');
  if (stopBtn) stopBtn.style.display = 'none';
  if (recBtn) recBtn.style.display = '';
}

function finishRecording() {
  const mimeType = _mediaRecorder && _mediaRecorder.mimeType || 'video/webm';
  const blob = new Blob(_recChunks, { type: mimeType });
  const mb = (blob.size / 1024 / 1024).toFixed(1);

  if (_videoObjectUrl) URL.revokeObjectURL(_videoObjectUrl);
  _videoObjectUrl = URL.createObjectURL(blob);

  // Store in localStorage if small enough
  if (blob.size < 6 * 1024 * 1024) {
    const reader = new FileReader();
    reader.onload = ev => { AC().videoData = ev.target.result; save(); };
    reader.readAsDataURL(blob);
  } else {
    AC().videoData = '';
    save();
    const warn = document.getElementById('vid-warn');
    if (warn) warn.innerHTML = '<span style="color:#E67E00">&#9888; Recording is ' + mb + ' MB — plays now but won\'t persist after reload. Keep the tab open during your presentation.</span>';
  }

  const fn = document.getElementById('vid-filename');
  if (fn) fn.textContent = 'Recorded video (' + mb + ' MB)';
  showVideoPlayer(_videoObjectUrl);
}

function removeVideo() {
  if (_videoObjectUrl) { URL.revokeObjectURL(_videoObjectUrl); _videoObjectUrl = null; }
  AC().videoData = '';
  AC().videoUrl = '';
  save();
  hideVideoPlayer();
  const warn = document.getElementById('vid-warn');
  if (warn) warn.innerHTML = '';
  const fn = document.getElementById('vid-filename');
  if (fn) fn.textContent = '';
  const timer = document.getElementById('vid-rec-timer');
  if (timer) timer.textContent = '00:00';
  const fi = document.getElementById('vid-file-input');
  if (fi) fi.value = '';
}


async function init(){
  await load();
  RS();
  RCL();
}
window.addEventListener('DOMContentLoaded',()=>init().catch(console.error));
